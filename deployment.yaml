apiVersion: apps/v1
kind: Deployment
metadata:
  name: mon-app-js
spec:
  replicas: 2
  selector:
    matchLabels:
      app: mon-app-js
  template:
    metadata:
      labels:
        app: mon-app-js
    spec:
      containers:
      - name: mon-app-js
        image: votre_username/mon-app-js:latest
        ports:
        - containerPort: 3000
